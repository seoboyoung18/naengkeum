# 냉큼 nginx — SPA 정적 서빙 + 백엔드(app:8080) 리버스 프록시
#  HTTPS(443)는 배포 단계에서 certbot으로 추가 (이 블록은 :80 기준).
server {
    listen 80;
    server_name _;

    # 업로드 최대 5MB(백엔드 한도) + 여유
    client_max_body_size 6m;

    root /usr/share/nginx/html;
    index index.html;

    # 프록시 공통 헤더 (server 레벨 → 하위 location 상속).
    #  X-Forwarded-Proto/Host는 OAuth2 redirect-uri를 올바른 스킴/도메인으로 만들기 위해 필수.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # ----- 백엔드로 프록시 -----
    location /api/            { proxy_pass http://app:8080; }
    location /images/         { proxy_pass http://app:8080; }
    location /oauth2/         { proxy_pass http://app:8080; }   # 소셜 로그인 시작
    location /login/oauth2/   { proxy_pass http://app:8080; }   # 소셜 로그인 콜백
    location /actuator/health { proxy_pass http://app:8080; }   # 헬스체크

    # SSE(AI 추천 스트리밍) — 버퍼링 끄기
    location /api/ai/ {
        proxy_pass http://app:8080;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # ----- SPA 라우팅 (그 외 전부 index.html) -----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
